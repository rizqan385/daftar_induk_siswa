      nilai_akhir:
        example: 85
        maximum: 100
        type: integer
      no_ijazah:
        example: DN-01/IJ-2027
        maxLength: 50
        type: string
      tahun_lulus:
        example: "2027"
        maxLength: 10
        type: string
      tanggal_lulus:
        example: "2027-06-15"
