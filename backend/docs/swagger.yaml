basePath: /api/v1
definitions:
  requests.BatchNilaiSemesterRequest:
    properties:
      nilai:
        items:
          $ref: '#/definitions/requests.CreateNilaiSemesterRequest'
        type: array
    required:
    - nilai
    type: object
  requests.CreateBeasiswaRequest:
    properties:
      keterangan:
        example: Beasiswa prestasi akademik
        type: string
      pemberi:
        example: Pemerintah
        maxLength: 100
        type: string
      tahun_pelajaran:
        example: 2024/2025
        maxLength: 20
        type: string
    required:
    - pemberi
    - tahun_pelajaran
    type: object
  requests.CreateCatatanSemesterRequest:
    properties:
      kelas:
        enum:
        - X
        - XI
        - XII
        example: X
        type: string
      semester:
        example: 1
        maximum: 2
        minimum: 1
        type: integer
    required:
    - kelas
    - semester
    type: object
  requests.CreateKepribadianRequest:
    properties:
      aspek:
        example: Disiplin/Ketertiban
        maxLength: 100
        type: string
      nilai:
