        example: 55
        type: number
      berat_badan_masuk:
        example: 50.5
        type: number
      golongan_darah:
        enum:
        - A
        - B
        - AB
        - O
        example: A
        type: string
      kesanggupan_jasmani:
        example: Baik
        type: string
      tinggi_badan_keluar:
        example: 165
        type: number
      tinggi_badan_masuk:
        example: 160
        type: number
    type: object
  requests.CreateNilaiIjazahRequest:
    properties:
      mata_pelajaran_id:
        example: 1
